<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Builder106 operator console — SWE, Cybersec, Analyst, Quant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf6"/>
      <stop offset="100%" stop-color="#f1ede4"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#e6e1d4"/>
    </pattern>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#dots)"/>

  <!-- Header band -->
  <text x="40" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#6e6a5c" letter-spacing="2">BUILDER106  //  OPERATOR CONSOLE</text>
  <text x="1160" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#1a7f37" letter-spacing="2" text-anchor="end">&#x25cf;  ALL SYSTEMS GREEN</text>
  <line x1="40" y1="60" x2="1160" y2="60" stroke="#e6e1d4" stroke-width="1"/>

  <!-- ============ TL: SWE (blue) ============ -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#ffffff" stroke="#e6e1d4" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#0969da"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0969da" letter-spacing="3">[ SWE ]</text>
    <circle cx="536" cy="30" r="4" fill="#1a7f37"/>
    <text x="24" y="86" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1a1a1a">LinuxBenchHub</text>
    <rect x="24" y="100" width="76" height="22" rx="3" fill="#f6f6f1" stroke="#d8d3c4" stroke-width="1"/>
    <text x="62" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#57606a" text-anchor="middle">Rails 8</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">VM benchmarking across Ubuntu, Fedora,</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">and Debian under identical virtual hardware.</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">Phoronix + Rails dashboard + noVNC live view.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#eae5d6" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8a8576">also &#x2192; STAIJA &#x2022; MicroMatch &#x2022; StudySprint &#x2022; portfolio</text>
  </g>

  <!-- ============ TR: CYBERSEC (red) ============ -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#ffffff" stroke="#e6e1d4" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#cf222e"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#cf222e" letter-spacing="3">[ CYBERSEC ]</text>
