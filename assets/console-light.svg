    <text x="55" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#57606a" text-anchor="middle">Rust</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">Rebuild every package, compare every byte,</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">block every tamper. A supply-chain integrity</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">verifier driven by Sigstore + SLSA.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#eae5d6" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8a8576">also &#x2192; HackHelper &#x2022; security review tooling</text>
  </g>

  <!-- ============ BL: ANALYST (amber) ============ -->
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#ffffff" stroke="#e6e1d4" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#9a6700"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9a6700" letter-spacing="3">[ ANALYST ]</text>
    <circle cx="536" cy="30" r="4" fill="#1a7f37"/>
    <text x="24" y="86" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1a1a1a">datafest-2026</text>
    <rect x="24" y="100" width="100" height="22" rx="3" fill="#f6f6f1" stroke="#d8d3c4" stroke-width="1"/>
    <text x="74" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#57606a" text-anchor="middle">R · DuckDB</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">Wesleyan DataFest 2026 (Team 13).</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">Transportation barriers in EHR data drive</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">3&#xd7; emergency-department visits. 7.6M encounters.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#eae5d6" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8a8576">also &#x2192; MedCore &#x2022; QAC coursework</text>
  </g>

  <!-- ============ BR: QUANT (green) ============ -->
  <g transform="translate(620, 390)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#ffffff" stroke="#e6e1d4" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#1a7f37"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1a7f37" letter-spacing="3">[ QUANT ]</text>
    <circle cx="536" cy="30" r="4" fill="#1a7f37"/>
    <text x="24" y="86" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#1a1a1a">ocaml_limit</text>
    <rect x="24" y="100" width="82" height="22" rx="3" fill="#f6f6f1" stroke="#d8d3c4" stroke-width="1"/>
    <text x="65" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#57606a" text-anchor="middle">OCaml 5</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">Zero-allocation limit-order-book matching</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">engine. ~18M ops/sec, p99 &lt; 1&#xb5;s. Bloomberg-</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#1f2328">terminal&#x2013;styled live dashboard.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#eae5d6" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8a8576">also &#x2192; CapitolAlpha &#x2022; qforge &#x2022; EconOS &#x2022; IMC_Prosperity</text>
