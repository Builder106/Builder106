<svg xmlns="http://www.w3.org/2000/svg" width="130" height="130" viewBox="0 0 130 130" role="img" aria-label="07 Rb Ruby LinuxBenchHub">
  <g opacity="1">
    <set attributeName="opacity" to="0" begin="0s"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.48s" dur="0.55s" fill="freeze"/>
    <rect x="0.5" y="0.5" width="129" height="129" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <rect x="0.5" y="0.5" width="129" height="3" rx="1.5" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0.45;1" dur="4s" begin="-1.47s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="500" fill="#a78bfa">07</text>
    <g transform="translate(118, 14)">
      <circle r="4" fill="#a78bfa">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle r="4" fill="#a78bfa" opacity="0.4">
        <animate attributeName="r" values="4;9;4" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="65" y="74" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="50" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Rb</text>
    <text x="65" y="98" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Ruby</text>
    <text x="65" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#6e7681" text-anchor="middle">LinuxBenchHub</text>
  </g>
</svg>
