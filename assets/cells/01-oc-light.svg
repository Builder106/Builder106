<svg xmlns="http://www.w3.org/2000/svg" width="130" height="130" viewBox="0 0 130 130" role="img" aria-label="01 Oc OCaml ocaml_limit">
  <g opacity="1">
    <set attributeName="opacity" to="0" begin="0s"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.00s" dur="0.55s" fill="freeze"/>
    <rect x="0.5" y="0.5" width="129" height="129" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <rect x="0.5" y="0.5" width="129" height="3" rx="1.5" fill="#1a7f37">
      <animate attributeName="opacity" values="1;0.45;1" dur="4s" begin="-0.21s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="500" fill="#1a7f37">01</text>
    <text x="65" y="74" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="50" font-weight="700" fill="#1f2328" text-anchor="middle" letter-spacing="-1">Oc</text>
    <text x="65" y="98" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#656d76" text-anchor="middle">OCaml</text>
    <text x="65" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#8c959f" text-anchor="middle">ocaml_limit</text>
  </g>
</svg>
