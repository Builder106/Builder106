<svg xmlns="http://www.w3.org/2000/svg" width="130" height="130" viewBox="0 0 130 130" role="img" aria-label="16 Sw Swift DOOM">
  <style>
    .card   { transform-origin: 65px 65px; transform-box: fill-box; animation: appear .55s cubic-bezier(.2,.7,.2,1) 1.20s both; }
    .stripe { animation: pulse 4s ease-in-out infinite -3.36s; transform-origin: 0 0; }
    @keyframes appear {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: .45; }
    }
  </style>
  <g class="card">
    <rect x="0.5" y="0.5" width="129" height="129" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <rect class="stripe" x="0.5" y="0.5" width="129" height="4" rx="2" fill="#0969da"/>
    <text x="10" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#0969da">16</text>
    <text x="65" y="70" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="#1f2328" text-anchor="middle">Sw</text>
    <text x="65" y="93" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="11" fill="#656d76" text-anchor="middle">Swift</text>
    <text x="65" y="113" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#8c959f" text-anchor="middle">DOOM</text>
  </g>
</svg>
