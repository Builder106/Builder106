<svg xmlns="http://www.w3.org/2000/svg" width="130" height="130" viewBox="0 0 130 130" role="img" aria-label="12 Ts TypeScript portfolio">
  <defs>
    <linearGradient id="g12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6b46c1" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#6b46c1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g opacity="1">
    <set attributeName="opacity" to="0" begin="0s"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.88s" dur="0.55s" fill="freeze"/>
    <rect x="0.5" y="0.5" width="129" height="129" rx="4" fill="#ebe4f7" stroke="#d0d7de" stroke-width="1"/>
    <rect x="0.5" y="0.5" width="129" height="129" rx="4" fill="url(#g12)"/>
    <rect x="0.5" y="0.5" width="129" height="3" rx="1.5" fill="#6b46c1">
      <animate attributeName="opacity" values="1;0.45;1" dur="4s" begin="-2.52s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#6b46c1">12</text>
    <text x="65" y="76" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="50" font-weight="700" fill="#1f2328" text-anchor="middle" letter-spacing="-1">Ts</text>
    <text x="65" y="101" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#656d76" text-anchor="middle">TypeScript</text>
    <text x="65" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8c959f" text-anchor="middle">portfolio</text>
  </g>
</svg>
