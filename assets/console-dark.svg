    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">Rebuild every package, compare every byte,</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">block every tamper. A supply-chain integrity</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">verifier driven by Sigstore + SLSA.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#21262d" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6e7681">also &#x2192; HackHelper &#x2022; security review tooling</text>
  </g>

