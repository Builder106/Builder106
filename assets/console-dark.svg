    <text x="62" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b949e" text-anchor="middle">Rails 8</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">VM benchmarking across Ubuntu, Fedora,</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">and Debian under identical virtual hardware.</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">Phoronix + Rails dashboard + noVNC live view.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#21262d" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6e7681">also &#x2192; STAIJA &#x2022; MicroMatch &#x2022; StudySprint &#x2022; portfolio</text>
  </g>

  <!-- ============ TR: CYBERSEC (red-orange) ============ -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#ff7b72"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ff7b72" letter-spacing="3">[ CYBERSEC ]</text>
