<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Builder106 operator console — SWE, Cybersec, Analyst, Quant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f15"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#1f2630"/>
    </pattern>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#dots)"/>

  <!-- Header band -->
  <text x="40" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#7d8590" letter-spacing="2">BUILDER106  //  OPERATOR CONSOLE</text>
  <text x="1160" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#3fb950" letter-spacing="2" text-anchor="end">&#x25cf;  ALL SYSTEMS GREEN</text>
  <line x1="40" y1="60" x2="1160" y2="60" stroke="#262d36" stroke-width="1"/>

  <!-- ============ TL: SWE (blue) ============ -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#58a6ff"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#58a6ff" letter-spacing="3">[ SWE ]</text>
