    <text x="74" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b949e" text-anchor="middle">R · DuckDB</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">Wesleyan DataFest 2026 (Team 13).</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">Transportation barriers in EHR data drive</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">3&#xd7; emergency-department visits. 7.6M encounters.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#21262d" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6e7681">also &#x2192; MedCore &#x2022; QAC coursework</text>
  </g>

  <!-- ============ BR: QUANT (green) ============ -->
  <g transform="translate(620, 390)">
    <rect x="0" y="0" width="560" height="290" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="290" rx="2" fill="#3fb950"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#3fb950" letter-spacing="3">[ QUANT ]</text>
    <circle cx="536" cy="30" r="4" fill="#3fb950"/>
    <text x="24" y="86" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6edf3">ocaml_limit</text>
    <rect x="24" y="100" width="82" height="22" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="65" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b949e" text-anchor="middle">OCaml 5</text>
    <text x="24" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">Zero-allocation limit-order-book matching</text>
    <text x="24" y="182" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">engine. ~18M ops/sec, p99 &lt; 1&#xb5;s. Bloomberg-</text>
    <text x="24" y="204" font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif" font-size="15" fill="#c9d1d9">terminal&#x2013;styled live dashboard.</text>
    <line x1="24" y1="238" x2="536" y2="238" stroke="#21262d" stroke-width="1"/>
    <text x="24" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6e7681">also &#x2192; CapitolAlpha &#x2022; qforge &#x2022; EconOS &#x2022; IMC_Prosperity</text>
