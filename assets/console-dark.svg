    <rect x="0" y="0" width="4" height="290" rx="2" fill="#d29922"/>
    <text x="24" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#d29922" letter-spacing="3">[ ANALYST ]</text>
